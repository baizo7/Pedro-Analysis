databases:
  - name: streaminsight-db
    databaseName: streaminsight_prod
    user: streaminsight_user

services:
  # Redis deployed as a private Docker container (bypasses Render's paid Managed Redis)
  - type: pserv
    name: streaminsight-redis
    env: docker
    dockerfilePath: redis/Dockerfile

  # FastAPI Backend
  - type: web
    name: saas-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: streaminsight-db
          property: connectionString
      - key: REDIS_URL
        value: redis://streaminsight-redis:6379/0
      - key: CELERY_BROKER_URL
        value: redis://streaminsight-redis:6379/0
      - key: SECRET_KEY
        generateValue: true

  # Celery Background Worker
  - type: worker
    name: saas-celery-worker
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: streaminsight-db
          property: connectionString
      - key: REDIS_URL
        value: redis://streaminsight-redis:6379/0
      - key: CELERY_BROKER_URL
        value: redis://streaminsight-redis:6379/0

  # React Frontend (Static Site)
  - type: web
    name: saas-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: saas-backend
          property: host
    routes:
      # Enable client-side routing for React Router
      - type: rewrite
        source: /*
        destination: /index.html
